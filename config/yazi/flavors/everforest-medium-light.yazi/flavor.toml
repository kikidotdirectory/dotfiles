# vim:fileencoding=utf-8:foldmethod=marker

# : Manager {{{

[mgr]
cwd = { fg = "#3a94c5" }

# Find
find_keyword  = { fg = "#dfa000", bold = true, italic = true, underline = true }
find_position = { fg = "#df69ba", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#8da101", bg = "#8da101" }
marker_cut      = { fg = "#f85552", bg = "#f85552" }
marker_marked   = { fg = "#3a94c5", bg = "#3a94c5" }
marker_selected = { fg = "#dfa000", bg = "#dfa000" }

# Count
count_copied   = { fg = "#f4f0d9", bg = "#8da101" }
count_cut      = { fg = "#f4f0d9", bg = "#f85552" }
count_selected = { fg = "#f4f0d9", bg = "#dfa000" }

# Border
border_symbol = "│"
border_style  = { fg = "#e0dcc7" }

# : }}}


# : Tabs {{{

[tabs]
active   = { fg = "#f4f0d9", bg = "#8da101", bold = true }
inactive = { fg = "#8da101", bg = "#efebd4" }

# : }}}


# : Mode {{{

[mode]

normal_main = { fg = "#efebd4", bg = "#8da101", bold = true }
normal_alt  = { fg = "#3a94c5", bg = "#e0dcc7", bold = true }

# Select mode
select_main = { fg = "#efebd4", bg = "#f85552", bold = true }
select_alt  = { fg = "#3a94c5", bg = "#e0dcc7", bold = true }

# Unset mode
unset_main = { fg = "#efebd4", bg = "#3a94c5", bold = true }
unset_alt  = { fg = "#3a94c5", bg = "#e0dcc7", bold = true }

# : }}}


# : Status bar {{{

[status]
# Permissions
perm_sep   = { fg = "#fdf6e3" }
perm_type  = { fg = "#8da101" }
perm_read  = { fg = "#dfa000" }
perm_write = { fg = "#f85552" }
perm_exec  = { fg = "#3a94c5" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#3a94c5", bg = "#efebd4" }
progress_error  = { fg = "#f85552", bg = "#efebd4" }

# : }}}


# : Pick {{{

[pick]
border   = { fg = "#3a94c5" }
active   = { fg = "#df69ba", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#3a94c5" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border   = { fg = "#3a94c5" }

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "#3a94c5" }
title   = {}
hovered = { fg = "#df69ba", underline = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#f4f0d9" }
cand            = { fg = "#3a94c5" }
rest            = { fg = "#fdf6e3" }
desc            = { fg = "#df69ba" }
separator       = "  "
separator_style = { fg = "#fdf6e3" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#3a94c5" }
run     = { fg = "#df69ba" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#fdf6e3", bg = "#5c6a72" }

# : }}}


# : Spotter {{{

[spot]
border   = { fg = "#3a94c5" }
title    = { fg = "#3a94c5" }
tbl_col  = { fg = "#3a94c5" }
tbl_cell = { fg = "#dfa000", reversed = true }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#8da101" }
title_warn  = { fg = "#dfa000" }
title_error = { fg = "#f85552" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# Images
	{ mime = "image/*", fg = "#3a94c5" },
	# Media
	{ mime = "{audio,video}/*", fg = "#df69ba" },
	# Archives
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f85552" },
	# Documents
	{ mime = "application/{pdf,doc,rtf}", fg = "#3a94c5" },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#e0dcc7" },
	# Fallback
	{ url = "*", fg = "#35a77c" },
	{ url = "*/", fg = "#8da101" },
]

# : }}}
